<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>

  <h3>Welcome {{ username }} | Room: {{ room }}</h3>

  <div id="messages" style="border:1px solid black; height:300px; overflow:auto;"></div>

  <form id="chat-form">
    <input id="message" placeholder="Type message..." required autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <script>
    const socket = io({
      transports: ["websocket", "polling"]
    });

    const form = document.getElementById('chat-form');
    const input = document.getElementById('message');
    const messages = document.getElementById('messages');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      if (input.value) {
        socket.emit('message', { message: input.value });
        input.value = '';
      }
    });

    socket.on('message', function(data) {
      const div = document.createElement('div');
      div.innerHTML = "<b>" + data.username + ":</b> " + data.message;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    });
  </script>

</body>
</html>
